apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rhoai-infrastructure
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai-demo-foundations
spec:
  description: RHOAI cluster dependencies and optional storage (MinIO)
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  sourceRepos:
    - https://github.com/dandawg/rhoai-deploy.git
    - https://github.com/dandawg/rhoai-demo-foundations.git
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
