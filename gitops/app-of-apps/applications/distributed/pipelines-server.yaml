apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipelines-server
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: pipelines-server
    app.kubernetes.io/part-of: rhoai-demo-foundations
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: rhoai-distributed
  source:
    repoURL: https://github.com/dandawg/rhoai-distributed.git
    targetRevision: main
    path: platform/pipelines
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
  # Live DSPA spec changes (or delete + leave absent until you sync) are not drift.
  # Sync to re-apply dspa.yaml from Git.
  ignoreDifferences:
    - group: datasciencepipelinesapplications.opendatahub.io
      kind: DataSciencePipelinesApplication
      name: dspa
      jsonPointers:
        - /spec
