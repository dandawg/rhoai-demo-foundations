apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-operator
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: rhoai-operator
    app.kubernetes.io/part-of: rhoai-demo-foundations
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: rhoai-platform
  source:
    repoURL: https://github.com/redhat-ai-americas/rhoai-deploy.git
    targetRevision: main
    path: platform/rhoai-operator/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
