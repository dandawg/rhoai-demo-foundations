apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oss-vllm-runtime
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: oss-vllm-runtime
    app.kubernetes.io/part-of: rhoai-demo-foundations
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: rhoai-serving
  source:
    repoURL: https://github.com/redhat-ai-americas/rhoai-model-serving.git
    targetRevision: main
    path: platform/models/serving/shared/oss-vllm-runtime
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
  ignoreDifferences:
    - group: serving.kserve.io
      kind: ServingRuntime
      jsonPointers:
        - /spec/containers/0/args
        - /spec/containers/0/image
        - /spec/containers/0/resources
        - /spec/containers/0/env
        - /metadata/annotations
        - /metadata/labels
        - /status
