apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: access-operator
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: access-operator
    app.kubernetes.io/part-of: rhoai-demo-foundations
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: rhoai-infrastructure
  source:
    repoURL: https://github.com/dandawg/rhoai-deploy.git
    targetRevision: main
    path: platform/access/eso-operator
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: access
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: access
    app.kubernetes.io/part-of: rhoai-demo-foundations
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: rhoai-infrastructure
  source:
    repoURL: https://github.com/dandawg/rhoai-deploy.git
    targetRevision: main
    path: platform/access
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
        - .spec.target.mergePolicy
    - group: external-secrets.io
      kind: ClusterSecretStore
      jsonPointers:
        - /status
