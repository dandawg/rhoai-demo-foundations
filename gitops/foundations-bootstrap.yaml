apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-demo-foundations-bootstrap
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: rhoai-demo-foundations-bootstrap
    app.kubernetes.io/part-of: rhoai-demo-foundations
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/dandawg/rhoai-demo-foundations.git
    targetRevision: main
    path: gitops/app-of-apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
